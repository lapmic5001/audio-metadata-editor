<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MP3 Tag Editor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: monospace; font-size: 14px; padding: 24px; max-width: 640px; }
  h1 { font-size: 18px; margin-bottom: 20px; }
  h2 { font-size: 14px; margin: 20px 0 10px; }
  label { display: block; margin-bottom: 4px; }
  input[type="text"], input[type="number"] {
    width: 100%; padding: 6px 8px; font-family: monospace; font-size: 14px;
    border: 1px solid #999; background: #fff; display: block; margin-bottom: 12px;
  }
  input[type="file"] { display: block; margin-bottom: 12px; }
  button {
    font-family: monospace; font-size: 14px; padding: 6px 14px;
    border: 1px solid #999; background: #fff; cursor: pointer;
  }
  button:hover { background: #eee; }
  #cover-preview { display: block; max-width: 160px; margin: 8px 0; border: 1px solid #ccc; }
  #status { margin-top: 16px; font-style: italic; color: #555; min-height: 20px; }
  #drop-zone {
    border: 2px dashed #aaa; padding: 32px; text-align: center;
    margin-bottom: 20px; cursor: pointer;
  }
  #drop-zone.drag-over { background: #f5f5f5; border-color: #333; }
  #editor { display: none; }
  hr { border: none; border-top: 1px solid #ccc; margin: 20px 0; }
</style>
</head>
<body>

<h1>mp3 tag editor</h1>

<div id="drop-zone">
  <div>drop an mp3 file here</div>
  <div style="margin-top:8px;color:#888;font-size:12px;">or click to browse</div>
  <input type="file" id="file-input" accept=".mp3,audio/mpeg" style="display:none">
</div>

<div id="editor">
  <div id="file-info" style="margin-bottom:16px;color:#555;"></div>
  <hr>
  <h2>track info</h2>
  <label>title</label>        <input type="text"   id="tag-title">
  <label>artist</label>       <input type="text"   id="tag-artist">
  <label>album artist</label> <input type="text"   id="tag-album-artist">
  <label>album</label>        <input type="text"   id="tag-album">
  <label>year</label>         <input type="number" id="tag-year" min="1900" max="2099">
  <label>track number</label> <input type="text"   id="tag-track" placeholder="e.g. 1 or 1/12">
  <label>disc number</label>  <input type="text"   id="tag-disc"  placeholder="e.g. 1 or 1/2">
  <label>genre</label>        <input type="text"   id="tag-genre">
  <label>composer</label>     <input type="text"   id="tag-composer">
  <label>comment</label>      <input type="text"   id="tag-comment">

  <h2>cover art</h2>
  <img id="cover-preview" style="display:none">
  <div id="cover-status" style="color:#888;font-size:12px;margin-bottom:8px;"></div>
  <label for="cover-input">replace cover (jpg / png)</label>
  <input type="file" id="cover-input" accept="image/jpeg,image/png">
  <button id="cover-remove" style="display:none;margin-bottom:12px;">remove cover</button>

  <hr>
  <button id="download-btn">download with new tags</button>
  <div id="status"></div>
</div>

<script>
// ── zero-dependency ID3v2 parser & writer ──────────────────────────────────

const $ = id => document.getElementById(id);

let originalBytes   = null;   // Uint8Array of the loaded file
let existingCover   = null;   // {data: Uint8Array, type: string} | null
let newCoverData    = null;   // replacement cover
let removeCover     = false;
let loadedFileName  = '';

// ── drop / file picker ─────────────────────────────────────────────────────
const dropZone = $('drop-zone');
dropZone.addEventListener('click', () => $('file-input').click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); loadFile(e.dataTransfer.files[0]); });
$('file-input').addEventListener('change', () => { if ($('file-input').files[0]) loadFile($('file-input').files[0]); });

async function loadFile(file) {
  if (!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext !== 'mp3') { alert('please load an mp3 file'); return; }

  loadedFileName = file.name;
  originalBytes  = new Uint8Array(await file.arrayBuffer());
  newCoverData   = null;
  removeCover    = false;
  existingCover  = null;
  $('status').textContent = '';
  $('file-info').textContent = `${file.name}  (${(file.size/1024/1024).toFixed(2)} MB)`;

  // clear fields
  ['title','artist','album-artist','album','year','track','disc','genre','composer','comment']
    .forEach(id => $('tag-' + id).value = '');
  $('cover-preview').style.display = 'none';
  $('cover-remove').style.display  = 'none';
  $('cover-status').textContent    = '';
  $('cover-input').value           = '';

  const tags = parseID3v2(originalBytes);
  if (tags) {
    setVal('tag-title',        tags.TIT2);
    setVal('tag-artist',       tags.TPE1);
    setVal('tag-album-artist', tags.TPE2);
    setVal('tag-album',        tags.TALB);
    setVal('tag-year',         tags.TYER || tags.TDRC);
    setVal('tag-track',        tags.TRCK);
    setVal('tag-disc',         tags.TPOS);
    setVal('tag-genre',        tags.TCON);
    setVal('tag-composer',     tags.TCOM);
    setVal('tag-comment',      tags.COMM);
    if (tags._cover) {
      existingCover = tags._cover;
      showCover(existingCover.data, existingCover.type);
    }
  }

  $('editor').style.display   = 'block';
  dropZone.style.display      = 'none';
}

function setVal(id, v) { if (v != null && v !== '') $(id).value = v; }

function showCover(data, type) {
  const url = URL.createObjectURL(new Blob([data], { type }));
  $('cover-preview').src = url;
  $('cover-preview').style.display = 'block';
  $('cover-remove').style.display  = 'inline-block';
}

// ── cover controls ─────────────────────────────────────────────────────────
$('cover-input').addEventListener('change', async () => {
  const f = $('cover-input').files[0];
  if (!f) return;
  removeCover  = false;
  newCoverData = { data: new Uint8Array(await f.arrayBuffer()), type: f.type };
  showCover(newCoverData.data, newCoverData.type);
  $('cover-status').textContent = 'new cover selected';
});
$('cover-remove').addEventListener('click', () => {
  removeCover = true; newCoverData = null; existingCover = null;
  $('cover-preview').style.display = 'none';
  $('cover-remove').style.display  = 'none';
  $('cover-status').textContent    = 'cover will be removed';
});

// ── download ───────────────────────────────────────────────────────────────
$('download-btn').addEventListener('click', () => {
  if (!originalBytes) return;
  $('status').textContent = 'writing tags…';
  try {
    const audioStart = findAudioStart(originalBytes);
    const audio      = originalBytes.slice(audioStart);
    const id3        = buildID3v2();
    const out        = new Uint8Array(id3.length + audio.length);
    out.set(id3); out.set(audio, id3.length);
    downloadBlob(new Blob([out], { type: 'audio/mpeg' }), loadedFileName);
    $('status').textContent = 'done!';
  } catch (e) {
    $('status').textContent = 'error: ' + e.message;
  }
});

function downloadBlob(blob, name) {
  const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(blob), download: name });
  document.body.appendChild(a); a.click(); setTimeout(() => a.remove(), 1000);
}

// ══════════════════════════════════════════════════════════════════════════
// ID3v2 PARSER (hand-rolled, no deps)
// ══════════════════════════════════════════════════════════════════════════
function parseID3v2(bytes) {
  if (bytes[0] !== 0x49 || bytes[1] !== 0x44 || bytes[2] !== 0x33) return null;
  const major = bytes[3];
  // total tag size (syncsafe)
  const tagSize = syncsafeDec(bytes, 6);
  const tags = {};
  let pos = 10;
  const end = 10 + tagSize;

  while (pos < end - 10) {
    const frameId = String.fromCharCode(bytes[pos], bytes[pos+1], bytes[pos+2], bytes[pos+3]);
    if (frameId.charCodeAt(0) === 0) break; // padding

    let frameSize;
    if (major >= 4) {
      frameSize = syncsafeDec(bytes, pos + 4);
    } else {
      frameSize = (bytes[pos+4] << 24) | (bytes[pos+5] << 16) | (bytes[pos+6] << 8) | bytes[pos+7];
    }
    pos += 10;
    if (frameSize <= 0 || pos + frameSize > end) break;

    const frameData = bytes.slice(pos, pos + frameSize);

    if (frameId === 'APIC') {
      tags._cover = parseAPIC(frameData);
    } else if (frameId === 'COMM') {
      tags.COMM = parseCOMM(frameData);
    } else if (frameId.startsWith('T')) {
      tags[frameId] = parseTextFrame(frameData);
    }
    pos += frameSize;
  }
  return tags;
}

function syncsafeDec(b, offset) {
  return ((b[offset] & 0x7f) << 21) | ((b[offset+1] & 0x7f) << 14) |
         ((b[offset+2] & 0x7f) << 7)  |  (b[offset+3] & 0x7f);
}

function parseTextFrame(data) {
  const enc = data[0];
  const raw = data.slice(1);
  if (enc === 1 || enc === 2) {
    // UTF-16 with or without BOM
    let start = 0;
    if (raw[0] === 0xff && raw[1] === 0xfe) start = 2; // LE BOM
    else if (raw[0] === 0xfe && raw[1] === 0xff) start = 2; // BE BOM
    const le = (raw[0] === 0xff && raw[1] === 0xfe) || enc === 1;
    let str = '';
    for (let i = start; i < raw.length - 1; i += 2) {
      const cp = le ? (raw[i] | (raw[i+1] << 8)) : ((raw[i] << 8) | raw[i+1]);
      if (cp === 0) break;
      str += String.fromCharCode(cp);
    }
    return str;
  }
  // Latin-1 or UTF-8
  let str = '';
  for (let i = 0; i < raw.length; i++) {
    if (raw[i] === 0) break;
    str += String.fromCharCode(raw[i]);
  }
  try { return decodeURIComponent(escape(str)); } catch { return str; }
}

function parseCOMM(data) {
  // encoding(1) + lang(3) + short desc + null + text
  const enc = data[0];
  let pos = 4; // skip encoding + lang
  // skip short description (null-terminated, 1 or 2 bytes per char depending on enc)
  if (enc === 1 || enc === 2) {
    while (pos < data.length - 1 && !(data[pos] === 0 && data[pos+1] === 0)) pos += 2;
    pos += 2;
  } else {
    while (pos < data.length && data[pos] !== 0) pos++;
    pos++;
  }
  return parseTextFrame(new Uint8Array([enc, ...data.slice(pos)]));
}

function parseAPIC(data) {
  const enc = data[0];
  let pos = 1;
  let mime = '';
  while (pos < data.length && data[pos] !== 0) mime += String.fromCharCode(data[pos++]);
  pos++; // skip null
  pos++; // picture type byte
  // skip description
  if (enc === 1 || enc === 2) {
    while (pos < data.length - 1 && !(data[pos] === 0 && data[pos+1] === 0)) pos += 2;
    pos += 2;
  } else {
    while (pos < data.length && data[pos] !== 0) pos++;
    pos++;
  }
  return { data: data.slice(pos), type: mime || 'image/jpeg' };
}

// ══════════════════════════════════════════════════════════════════════════
// ID3v2.3 WRITER (hand-rolled, no deps)
// ══════════════════════════════════════════════════════════════════════════
function findAudioStart(bytes) {
  if (bytes[0] === 0x49 && bytes[1] === 0x44 && bytes[2] === 0x33) {
    return 10 + syncsafeDec(bytes, 6);
  }
  return 0;
}

function buildID3v2() {
  const frames = [];
  const txt = (id, elId) => { const v = $(elId).value.trim(); if (v) frames.push(textFrame(id, v)); };
  txt('TIT2', 'tag-title');
  txt('TPE1', 'tag-artist');
  txt('TPE2', 'tag-album-artist');
  txt('TALB', 'tag-album');
  txt('TYER', 'tag-year');
  txt('TRCK', 'tag-track');
  txt('TPOS', 'tag-disc');
  txt('TCON', 'tag-genre');
  txt('TCOM', 'tag-composer');
  const comment = $('tag-comment').value.trim();
  if (comment) frames.push(commFrame(comment));
  const cover = newCoverData ?? (!removeCover ? existingCover : null);
  if (cover) frames.push(apicFrame(cover.data, cover.type));

  const bodyLen = frames.reduce((s, f) => s + f.length, 0);
  const tag = new Uint8Array(10 + bodyLen);
  tag[0]=0x49; tag[1]=0x44; tag[2]=0x33; // ID3
  tag[3]=0x03; tag[4]=0x00;               // version 2.3
  // syncsafe size
  tag[6]=(bodyLen>>21)&0x7f; tag[7]=(bodyLen>>14)&0x7f;
  tag[8]=(bodyLen>>7) &0x7f; tag[9]=bodyLen&0x7f;
  let off = 10;
  for (const f of frames) { tag.set(f, off); off += f.length; }
  return tag;
}

function utf16le(str) {
  const out = new Uint8Array(2 + str.length * 2);
  out[0]=0xff; out[1]=0xfe; // LE BOM
  for (let i = 0; i < str.length; i++) {
    out[2+i*2] = str.charCodeAt(i) & 0xff;
    out[3+i*2] = (str.charCodeAt(i) >> 8) & 0xff;
  }
  return out;
}

function frameHeader(id, payloadLen) {
  const h = new Uint8Array(10);
  for (let i=0;i<4;i++) h[i] = id.charCodeAt(i);
  h[4]=(payloadLen>>24)&0xff; h[5]=(payloadLen>>16)&0xff;
  h[6]=(payloadLen>>8) &0xff; h[7]=payloadLen&0xff;
  return h;
}

function textFrame(id, value) {
  const encoded = utf16le(value);
  const payload = new Uint8Array(1 + encoded.length);
  payload[0] = 0x01; payload.set(encoded, 1); // encoding=UTF-16
  const out = new Uint8Array(10 + payload.length);
  out.set(frameHeader(id, payload.length)); out.set(payload, 10);
  return out;
}

function commFrame(text) {
  const encoded = utf16le(text);
  // enc(1) + lang(3) + null-desc UTF-16(2) + text
  const payload = new Uint8Array(1 + 3 + 2 + encoded.length);
  payload[0]=0x01; payload[1]=0x65; payload[2]=0x6e; payload[3]=0x67; // enc, 'eng'
  payload[4]=0x00; payload[5]=0x00; // empty UTF-16 desc
  payload.set(encoded, 6);
  const out = new Uint8Array(10 + payload.length);
  out.set(frameHeader('COMM', payload.length)); out.set(payload, 10);
  return out;
}

function apicFrame(imgData, mimeType) {
  const mime = new TextEncoder().encode(mimeType || 'image/jpeg');
  // enc(1) + mime + null(1) + pictype(1) + desc-null(1) + data
  const payload = new Uint8Array(1 + mime.length + 1 + 1 + 1 + imgData.length);
  let p = 0;
  payload[p++] = 0x00; // Latin-1 encoding for mime
  payload.set(mime, p); p += mime.length;
  payload[p++] = 0x00; // null terminator
  payload[p++] = 0x03; // picture type: front cover
  payload[p++] = 0x00; // empty description
  payload.set(imgData, p);
  const out = new Uint8Array(10 + payload.length);
  out.set(frameHeader('APIC', payload.length)); out.set(payload, 10);
  return out;
}
</script>
</body>
</html>
